(function() {
  var blockList = ["local.visme.co", "/api/auth/", "/ajax/"];
  function shouldBlock(url) {
    var u = String(url || "");
    return blockList.some(function(b) { return u.indexOf(b) !== -1; });
  }
  var origFetch = window.fetch;
  window.fetch = function(url) {
    var u = typeof url === "string" ? url : (url && url.url) || "";
    if (shouldBlock(u))
      return Promise.resolve(new Response("{}", { status: 200, headers: { "Content-Type": "application/json" } }));
    return origFetch.apply(this, arguments);
  };
  var OrigXHR = window.XMLHttpRequest;
  window.XMLHttpRequest = function() {
    var xhr = new OrigXHR();
    var _open = xhr.open.bind(xhr);
    var _send = xhr.send.bind(xhr);
    var blocked = false;
    xhr.open = function() {
      if (shouldBlock(arguments[1])) { blocked = true; return; }
      return _open.apply(null, arguments);
    };
    xhr.send = function() {
      if (blocked) {
        Object.defineProperty(xhr, "status", { value: 200, configurable: true });
        Object.defineProperty(xhr, "readyState", { value: 4, configurable: true });
        Object.defineProperty(xhr, "responseText", { value: "{}", configurable: true });
        Object.defineProperty(xhr, "response", { value: "{}", configurable: true });

          var ev = new Event("readystatechange");
          xhr.dispatchEvent(ev);
          if (typeof xhr.onreadystatechange === "function") xhr.onreadystatechange(ev);
          var loadEv = new ProgressEvent("load");
          xhr.dispatchEvent(loadEv);
          if (typeof xhr.onload === "function") xhr.onload(loadEv);
        }, 0);
        return;
      }
      return _send.apply(null, arguments);
    };
    return xhr;
  };

  window.XMLHttpRequest.DONE = 4;
  window.XMLHttpRequest.HEADERS_RECEIVED = 2;
  window.XMLHttpRequest.LOADING = 3;
  window.XMLHttpRequest.OPENED = 1;
  window.XMLHttpRequest.UNSENT = 0;

    var msg = String(arguments[0] || "");

  }
  var observer = new MutationObserver(function(_, obs) {

  setTimeout(function() { observer.disconnect(); }, 15000);

(function() {
  var TARGET_URL = "https://worksync.murphylan.cloud";
  function hijackButton() {
    var btns = document.querySelectorAll('[class*="button--"]');
    var btn = null;
    btns.forEach(function(el) {
      var txt = (el.textContent || "").trim();
      if (txt.indexOf("\u767b\u5f55") !== -1 || txt.indexOf("\u524d\u5f80") !== -1) btn = el;
    });
    if (!btn) return false;
    var span = btn.querySelector("p") || btn.querySelector("span") || btn;
    span.textContent = "\u524d\u5f80";

      e.preventDefault();
      e.stopPropagation();
      e.stopImmediatePropagation();
      try { window.top.location.href = TARGET_URL; } catch(_) { window.location.href = TARGET_URL; }
    }, true);
    return true;
  }
  var obs = new MutationObserver(function(_, o) {
    if (hijackButton()) o.disconnect();
  });
  obs.observe(document.documentElement, { childList: true, subtree: true });
